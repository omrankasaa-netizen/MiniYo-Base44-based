<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/miniyo-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Facebook app id (site-wide, required for Meta catalog / pixel linkage) -->
    <meta property="fb:app_id" content="1056890613436446" />

    <!-- MINIYO_SOCIAL_META_START — the block between these markers is the
         site-wide default. The Express server replaces it on /product/:slug
         requests with per-product SEO + OpenGraph product tags + JSON-LD so
         Meta's (non-JS) crawler receives per-product structured data. -->
    <!-- Primary SEO -->
    <title>MiniYo | Baby & Kids Clothing Lebanon — ملابس أطفال لبنان</title>
    <meta name="description" content="MiniYo — soft, thoughtful baby and kids clothing delivered across Lebanon. Shop newborn, baby, toddler & kids styles. Cash on delivery. | ميني يو — ملابس ناعمة وأنيقة للأطفال في لبنان، توصيل لجميع المناطق، الدفع عند الاستلام." />
    <meta name="keywords" content="baby clothes lebanon, kids clothing beirut, newborn outfits, ملابس أطفال لبنان, ملابس مواليد, ميني يو" />
    <meta name="author" content="MiniYo" />
    <link rel="canonical" href="https://miniyokids.com/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://miniyokids.com/" />
    <meta property="og:title" content="MiniYo | Baby & Kids Clothing Lebanon" />
    <meta property="og:description" content="Soft, thoughtful clothing for Lebanon's little ones. Free delivery on orders over $50. Cash on delivery available. | ملابس ناعمة لصغار لبنان." />
    <meta property="og:image" content="https://miniyokids.com/miniyo-share.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:alt" content="MiniYo — baby & kids clothing Lebanon" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="ar_LB" />
    <meta property="og:site_name" content="MiniYo" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MiniYo | Baby & Kids Clothing Lebanon" />
    <meta name="twitter:description" content="Soft, thoughtful clothing for Lebanon's little ones. Cash on delivery." />
    <meta name="twitter:image" content="https://miniyokids.com/miniyo-share.jpg" />
    <!-- MINIYO_SOCIAL_META_END -->

    <!-- Robots -->
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#2F5D57" />

    <!-- Meta (Facebook) Pixel — init only. PageView is fired from the React
         router (src/lib/pixel.js) on first load and every route change, so we do
         NOT call fbq('track','PageView') here to avoid double-counting. -->
    <script>
      !function(f,b,e,v,n,t,s)
      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)}(window, document,'script',
      'https://connect.facebook.net/en_US/fbevents.js');
      // Consent Mode: revoke BEFORE init so no cookies (_fbp/_fbc) are set and
      // no events are sent until the visitor accepts the cookie banner. The app
      // calls fbq('consent','grant') after Accept (and on return visits that
      // already stored a 'granted' choice in localStorage 'miniyo-consent').
      fbq('consent', 'revoke');
      fbq('init', '1480243427454221');
    </script>
    <!-- End Meta Pixel -->
  </head>
  <body>
    <!-- Meta Pixel <noscript> fallback -->
    <noscript><img height="1" width="1" style="display:none"
      src="https://www.facebook.com/tr?id=1480243427454221&ev=PageView&noscript=1"
      alt="" /></noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
