<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/miniyo-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Preconnect to third-party origins used on first paint: Meta Pixel loader,
         TikTok Pixel loader, and the product-image CDN. Warming the TLS/DNS
         handshake early speeds up Facebook-ad mobile traffic on cellular. -->
    <link rel="preconnect" href="https://connect.facebook.net" crossorigin />
    <link rel="preconnect" href="https://analytics.tiktok.com" crossorigin />
    <link rel="preconnect" href="https://images.miniyokids.com" crossorigin />
    <!-- dns-prefetch fallbacks for browsers that ignore preconnect (older WebViews) -->
    <link rel="dns-prefetch" href="https://connect.facebook.net" />
    <link rel="dns-prefetch" href="https://analytics.tiktok.com" />
    <link rel="dns-prefetch" href="https://images.miniyokids.com" />

    <!-- Branded splash shown inside #root until React mounts and replaces it.
         Pure inline CSS, zero requests, system fonts. Colors match the app
         theme exactly (--background #FAF7F2, --primary #2F5D57, --secondary
         #7FA99B from src/index.css) so there is no color flash on takeover. -->
    <style>
      #root:has(.miniyo-splash){min-height:100vh}
      .miniyo-splash{box-sizing:border-box;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:#FAF7F2;color:#2F5D57;font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;text-align:center;padding:24px}
      .miniyo-splash .wordmark{margin:0;font-size:clamp(34px,10vw,52px);font-weight:700;letter-spacing:.02em;line-height:1}
      .miniyo-splash .tagline{margin:0;font-size:14px;color:#7FA99B}
      .miniyo-splash .dots{display:flex;gap:8px}
      .miniyo-splash .dot{width:9px;height:9px;border-radius:50%;background:#2F5D57;opacity:.25;animation:miniyo-pulse 1.2s ease-in-out infinite}
      .miniyo-splash .dot:nth-child(2){animation-delay:.15s}
      .miniyo-splash .dot:nth-child(3){animation-delay:.3s}
      @keyframes miniyo-pulse{0%,100%{opacity:.25;transform:scale(1)}50%{opacity:1;transform:scale(1.25)}}
      @media (prefers-reduced-motion:reduce){.miniyo-splash .dot{animation:none;opacity:.6}}
      .miniyo-noscript{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#FAF7F2;color:#2F5D57;font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;text-align:center;padding:24px;font-size:16px;line-height:1.5}
    </style>

    <!-- Facebook app id (site-wide, required for Meta catalog / pixel linkage) -->
    <meta property="fb:app_id" content="1056890613436446" />

    <!-- MINIYO_SOCIAL_META_START — the block between these markers is the
         site-wide default. The Express server replaces it on /product/:slug
         requests with per-product SEO + OpenGraph product tags + JSON-LD so
         Meta's (non-JS) crawler receives per-product structured data. -->
    <!-- Primary SEO -->
    <title>MiniYo | Baby & Kids Clothing Lebanon — ملابس أطفال لبنان</title>
    <meta name="description" content="MiniYo — soft, thoughtful baby and kids clothing delivered across Lebanon. Shop newborn, baby, toddler & kids styles. Cash on delivery. | ميني يو — ملابس ناعمة وأنيقة للأطفال في لبنان، توصيل لجميع المناطق، الدفع عند الاستلام." />
    <meta name="keywords" content="baby clothes lebanon, kids clothing beirut, newborn outfits, ملابس أطفال لبنان, ملابس مواليد, ميني يو" />
    <meta name="author" content="MiniYo" />
    <link rel="canonical" href="https://miniyokids.com/" />

    <!-- hreflang: the SPA has a client-side EN/AR toggle with no separate URLs,
         so both alternates point at the single canonical URL. An "ar" hreflang
         is intentionally NOT declared — Arabic routing would need dedicated
         /ar/ URLs in a future iteration before it can be. -->
    <link rel="alternate" hreflang="x-default" href="https://miniyokids.com/" />
    <link rel="alternate" hreflang="en" href="https://miniyokids.com/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://miniyokids.com/" />
    <meta property="og:title" content="MiniYo | Baby & Kids Clothing Lebanon" />
    <meta property="og:description" content="Soft, thoughtful clothing for Lebanon's little ones. Free delivery on orders over $50. Cash on delivery available. | ملابس ناعمة لصغار لبنان." />
    <meta property="og:image" content="https://miniyokids.com/miniyo-share.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:alt" content="MiniYo — baby & kids clothing Lebanon" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="ar_AR" />
    <meta property="og:site_name" content="MiniYo" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MiniYo | Baby & Kids Clothing Lebanon" />
    <meta name="twitter:description" content="Soft, thoughtful clothing for Lebanon's little ones. Cash on delivery." />
    <meta name="twitter:image" content="https://miniyokids.com/miniyo-share.jpg" />
    <!-- MINIYO_SOCIAL_META_END -->

    <!-- Robots -->
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#2F5D57" />

    <!-- Meta (Facebook) Pixel — init only. PageView is fired from the React
         router (src/lib/pixel.js) on first load and every route change, so we do
         NOT call fbq('track','PageView') here to avoid double-counting. -->
    <script>
      !function(f,b,e,v,n,t,s)
      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)}(window, document,'script',
      'https://connect.facebook.net/en_US/fbevents.js');
      // Consent Mode: revoke BEFORE init so no cookies (_fbp/_fbc) are set and
      // no events are sent until the visitor accepts the cookie banner. The app
      // calls fbq('consent','grant') after Accept (and on return visits that
      // already stored a 'granted' choice in localStorage 'miniyo-consent').
      fbq('consent', 'revoke');
      fbq('init', '1480243427454221');
    </script>
    <!-- End Meta Pixel -->

    <!-- TikTok Pixel — loader only. Installed ALONGSIDE the Meta Pixel. The page
         view (ttq.page()) is fired from the React router (src/lib/pixel.js) on
         first load and every route change, so we do NOT call ttq.page() here — it
         would double-count. TikTok has no fbq-style consent('revoke') API, so
         ttq.page()/ttq.track() are gated behind the same marketing-consent check
         as the Meta Pixel and fire only after the visitor accepts the banner. -->
    <script>
      !function (w, d, t) {
        w.TiktokAnalyticsObject=t;var ttq=w[t]=w[t]||[];ttq.methods=["page","track","identify","instances","debug","on","off","once","ready","alias","group","enableCookie","disableCookie","holdConsent","revokeConsent","grantConsent"];ttq.setAndDefer=function(t,e){t[e]=function(){t.push([e].concat(Array.prototype.slice.call(arguments,0)))}};for(var i=0;i<ttq.methods.length;i++)ttq.setAndDefer(ttq,ttq.methods[i]);ttq.instance=function(t){for(var e=ttq._i[t]||[],n=0;n<ttq.methods.length;n++)ttq.setAndDefer(e,ttq.methods[n]);return e},ttq.load=function(e,n){var r="https://analytics.tiktok.com/i18n/pixel/events.js",o=n&&n.partner;ttq._i=ttq._i||{},ttq._i[e]=[],ttq._i[e]._u=r,ttq._t=ttq._t||{},ttq._t[e]=+new Date,ttq._o=ttq._o||{},ttq._o[e]=n||{};n=document.createElement("script");n.type="text/javascript",n.async=!0,n.src=r+"?sdkid="+e+"&lib="+t;e=document.getElementsByTagName("script")[0];e.parentNode.insertBefore(n,e)};
        ttq.load('D9BP18JC77U1026616UG');
      }(window, document, 'ttq');
    </script>
    <!-- End TikTok Pixel -->
  </head>
  <body>
    <!-- Meta Pixel <noscript> fallback -->
    <noscript><img height="1" width="1" style="display:none"
      src="https://www.facebook.com/tr?id=1480243427454221&ev=PageView&noscript=1"
      alt="" /></noscript>
    <div id="root">
      <div class="miniyo-splash" role="status" aria-live="polite">
        <h1 class="wordmark">MiniYo</h1>
        <div class="dots" aria-hidden="true"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
        <p class="tagline">Soft things on the way&hellip;</p>
      </div>
    </div>
    <noscript>
      <div class="miniyo-noscript">
        <p><strong>MiniYo</strong><br />Please enable JavaScript to shop MiniYo — soft baby &amp; kids clothing, delivered across Lebanon.</p>
      </div>
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
